<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script>
    MathJax = { tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] } };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; margin: 0; background: #0f172a;
    }
    .card-front { max-width: 650px; width: 100%; padding: 2rem; text-align: center; }
    .question { font-size: 1.4rem; font-weight: 600; color: #e2e8f0; line-height: 1.6; }
    .formula-preview { margin-top: 1.2rem; font-size: 1.1rem; color: #94a3b8; }
    .difficulty { margin-top: 1rem; display: inline-block;
      padding: 0.2rem 0.7rem; border-radius: 999px; font-size: 0.8rem; font-weight: 600; }
    .easy { background: #166534; color: #86efac; }
    .medium { background: #92400e; color: #fcd34d; }
    .hard { background: #7f1d1d; color: #fca5a5; }
  </style>
</head>
<body>
  <div class="card-front">
    <div class="question">{{question}}</div>
    {{formula_preview}}
    {{difficulty_badge}}
  </div>
</body>
</html>
