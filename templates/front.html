<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    .card-front {
      text-align: center;
      padding: 2rem;
    }
    .word {
      font-size: 3rem;
      font-weight: 700;
      color: #1a1a2e;
      letter-spacing: 0.02em;
    }
    .hint {
      font-size: 0.9rem;
      color: #888;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="card-front">
    <div class="word">{{word}}</div>
    <div class="hint">What does this mean?</div>
  </div>
</body>
</html>
